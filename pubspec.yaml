name: focus_rpg
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.2+3

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  confetti: ^0.8.0
  audioplayers: ^6.5.1
  google_mobile_ads: ^6.0.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: PixelFont 
      fonts:
        - asset: assets/fonts/Pixel.ttf

# --- İKON AYARLARI ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21 

# --- AÇILIŞ EKRANI AYARLARI ---
flutter_native_splash:
  color: "#2C2C54"
  image: assets/icon.png
  android_12: 
    color: "#2C2C54"
    image: assets/icon.png
  fullscreen: true